name: Bug report
description: Report something that isn't working
labels: ["bug"]
body:
  - type: dropdown
    id: agent_posture
    attributes:
      label: Agent posture
      description: Can an autonomous coding agent fix this end-to-end, or does it need a human decision first?
      options:
        - "🤖 Agent-ready — repro clear; an agent can proceed"
        - "🧑 Needs human decision — see the field below"
    validations:
      required: true
  - type: textarea
    id: human_decision
    attributes:
      label: Human decision needed (if any)
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably trigger the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: "e.g. macOS 14.5, Windows 11 23H2, Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Hardware model (Mac) / CPU arch
      placeholder: "e.g. MacBook Pro M3, x86_64"
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - frontend
        - rust
        - mcp-server
        - ci
        - docs
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
    validations:
      required: false
